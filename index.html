<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção de Cães (ONG)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <h1>Adote seu pet!</h1>
        <form id="FormularioAdocao">
            <div>
                <label for="nome">Nome completo</label>
                <br>
                <input type="text" name="nome" id="nome" required>
            </div>
            <div>
                <label for="email">E-mail</label>
                <br>
                <input type="email" name="email" id="email" required>
            </div>

            <div>
                <label for="telefone">Telefone</label>
                <br>
                <input type="text" name="telefone" id="telefone" required>
            </div>
            <div>
                <label for="cpf">CPF</label>
                <br>
                <input type="text" name="cpf" id="cpf" required>
            </div>
            <div>
                <label for="idade">Idade</label>
                <br>
                <input type="number" name="idade" id="idade" required>
            </div>
            <div>
                <label for="cidade">Cidade</label>
                <br>
                <input type="text" name="cidade" id="cidade" required>
            </div>
            <div>
                <label for="moradia">Tipo de moradia (Casa ou Apartamento)</label>
                <br>
                <select name="escolhas" id="moradia" required>
                    <option value="opção1"></option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            </div>
            <div>
                <label for="quintal">Você tem quintal? (Sim ou Não)</label>
                <br>
                <select name="escolhas" id="quintal" required>
                    <option value="opção1"></option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>
            <div>
                <label for="pet">Você já teve pet? (Sim ou Não)</label>
                <br>
                <select name="escolhas" id="tevepet" required>
                    <option value="opção1"></option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>
            <div>
                <label for="horas">Quantas horas o animal ficará sozinho por dia?</label>
                <br>
                <input type="number" id="horas" required>
            </div>
            <div>
                <label for="motivo">Motivo da adoção</label>
                <br>
                <textarea name="motivo" id="motivo" rows="10" cols="30" required></textarea>
            </div>
            <br>
            <div>
                <label for="termo">Aceite os termos de responsabilidade</label>
                <br>
                <input type="checkbox" id="termo" required>
            </div>
            <br> <br>
            <div>
                <button type="submit">Cadastrar-se</button>
            </div>

            
</form>
<div id="resultado"></div>
    </main>

    <script src="script2.js"></script>
</body>

</html>
