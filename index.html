<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção de Cães (ONG)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
   
    <main>
        <h1>Adote seu pet!</h1>
        <div>
            <label for="nome">Nome completo</label>
            <input type="text" name="nome" id="nome">
        </div>
        <div>
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email">
        </div>

        <div>
            <label for="telefone">Telefone</label>
            <input type="text" name="telefone" id="telefone">
        </div>
        <div>
            <label for="cpf">CPF</label>
            <input type="text" name="cpf" id="cpf">
        </div>
        <div>
            <label for="idade">Data de nascimento</label>
            <input type="date" name="idade" id="idade">
        </div>
        <div>
            <label for="cidade">Cidade</label>
            <input type="text" name="cidade" id="cidade">
        </div>
        <div>
            <label for="moradia">Tipo de moradia (Casa ou Apartamento)</label>
            <select name="escolhas" id="moradia">
                <option value="opção1"></option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
        </div>
        <div>
            <label for="quintal">Você tem quintal? (Sim ou Não)</label>
            <select name="escolhas" id="quintal">
                <option value="opção1"></option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
        <div>
            <label for="pet">Você já teve pet? (Sim ou Não)</label>
            <select name="escolhas" id="tevepet">
                <option value="opção1"></option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
        <div>
            <label for="horas">Quantas horas o animal ficará sozinho por dia?</label>
            <input type="number" id="horas">
        </div>
        <div>
            <label for="motivo">Motivo da adoção</label>
            <textarea name="motivo" id="motivo" rows="3" cols="40"></textarea>
        </div>
        <div>
            <label for="termo">Aceite os termos de responsabilidade</label>
            <input type="checkbox" id="termo"> 
        </div>

        <div>
            <button type="submit">Cadastrar-se</button>
        </div>

    </main>
    <footer>


    </footer>
    <form onsubmit="return formulario()">
    <script src="script.js"></script>
</body>

</html>
